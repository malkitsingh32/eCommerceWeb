<aside class="app-sidebar" [class.collapsed]="collapsed()" aria-label="Sidebar navigation">
  <div class="sidebar-brand">
    <img ngSrc="assets/images/logo-mark.svg" width="32" height="32" alt="E-Commerce logo" />
    @if(!collapsed()) {
    <span>E-Commerce</span>
    }
  </div>

  <nav class="sidebar-nav">
    <a
      routerLink="/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="nav-item"
    >
      <span class="icon">📊</span>
      @if(!collapsed()) {
      <span>Dashboard</span>
      }
    </a>

    <a routerLink="/products" routerLinkActive="active" class="nav-item">
      <span class="icon">📦</span>
      @if(!collapsed()) {
      <span>Products</span>
      }
    </a>

    <a routerLink="/orders" routerLinkActive="active" class="nav-item">
      <span class="icon">🛒</span>
      @if(!collapsed()) {
      <span>Orders</span>
      }
    </a>
  </nav>
</aside>
