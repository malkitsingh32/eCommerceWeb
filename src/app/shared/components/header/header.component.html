<mat-toolbar class="app-header">
  <div class="header-left">
    <button
      mat-icon-button
      type="button"
      class="menu-btn"
      (click)="onToggleSidebar()"
      [attr.aria-label]="isSidebarCollapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
      [attr.aria-expanded]="!isSidebarCollapsed()"
    >
      @if(isSidebarCollapsed()) {
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="3" y="4" width="18" height="16" rx="3" stroke="currentColor" stroke-width="1.7"/>
        <path d="M8 4V20" stroke="currentColor" stroke-width="1.7"/>
        <path d="M13 12H18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M15.8 9.8L18 12L15.8 14.2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      } @else {
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="3" y="4" width="18" height="16" rx="3" stroke="currentColor" stroke-width="1.7"/>
        <path d="M8 4V20" stroke="currentColor" stroke-width="1.7"/>
        <path d="M13 12H18" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M15.2 9.8L13 12L15.2 14.2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      }
    </button>
  </div>

  <div class="header-right">
    <button mat-icon-button type="button" class="action-btn" aria-label="Notifications">🔔</button>
    <button mat-stroked-button type="button" class="user-btn" aria-label="User account">
      <span class="avatar">A</span>
      <span class="name">Welcome</span>
    </button>
  </div>
</mat-toolbar>
