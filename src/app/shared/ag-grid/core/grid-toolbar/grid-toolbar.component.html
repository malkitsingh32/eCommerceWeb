<div class="grid-toolbar">
  <div class="toolbar-left">
    @if (title) {
      <span class="grid-title">{{ title }}</span>
    }
  </div>

  <div class="toolbar-right">
    @if (enableSearch) {
      <mat-form-field class="search-input" appearance="outline" subscriptSizing="dynamic">
        <mat-label>Quick search</mat-label>
        <input matInput type="text" (input)="onSearch($event)" />
      </mat-form-field>
    }

    <app-button
      materialStyle="stroked"
      variant="secondary"
      [fullWidth]="false"
      buttonClass="toolbar-btn"
      title="Clear Filters"
      label="🔄 Clear Filters"
      (clicked)="clearFilters.emit()"
    ></app-button>
    <app-button
      materialStyle="stroked"
      variant="secondary"
      [fullWidth]="false"
      buttonClass="toolbar-btn"
      title="Auto-Size Columns"
      label="↔ Auto Size"
      (clicked)="autoSize.emit()"
    ></app-button>
    <app-button
      materialStyle="stroked"
      variant="secondary"
      [fullWidth]="false"
      buttonClass="toolbar-btn"
      title="Refresh"
      label="↺ Refresh"
      (clicked)="refresh.emit()"
    ></app-button>

    @if (actionButton?.label) {
      <app-button
        [materialStyle]="(actionButton?.variant === 'primary' || actionButton?.variant === 'danger') ? 'raised' : 'stroked'"
        [variant]="actionButton?.variant ?? 'primary'"
        [fullWidth]="false"
        [buttonClass]="actionButton?.buttonClass ?? 'toolbar-btn'"
        [title]="actionButton?.title"
        [label]="actionButton?.label ?? ''"
        (clicked)="actionClick.emit()"
      ></app-button>
    }

    @if (enableExport) {
      <app-button
        materialStyle="stroked"
        variant="secondary"
        [fullWidth]="false"
        buttonClass="toolbar-btn export-btn"
        label="⬇ CSV"
        (clicked)="exportCsv.emit()"
      ></app-button>
      <app-button
        materialStyle="stroked"
        variant="secondary"
        [fullWidth]="false"
        buttonClass="toolbar-btn export-btn"
        label="⬇ Excel"
        (clicked)="exportExcel.emit()"
      ></app-button>
    }
  </div>
</div>
