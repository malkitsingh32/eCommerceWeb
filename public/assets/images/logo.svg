<svg width="420" height="120" viewBox="0 0 420 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="E-Commerce logo">
  <defs>
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="180" height="120" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F1724" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Icon block -->
  <g filter="url(#shadow)">
    <rect x="10" y="10" width="100" height="100" rx="22" fill="url(#brandGradient)"/>
  </g>

  <!-- Stylized E -->
  <path d="M38 37H84" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <path d="M38 60H74" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <path d="M38 83H84" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <path d="M38 37V83" stroke="white" stroke-width="10" stroke-linecap="round"/>

  <!-- Cart accent -->
  <path d="M79 79L91 79C94 79 96 77 97 74L100 64" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="88" cy="86" r="3.2" fill="white"/>
  <circle cx="96" cy="86" r="3.2" fill="white"/>

  <!-- Brand text -->
  <text x="132" y="61" fill="#0F1724" font-size="36" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="0.4">
    E-Commerce
  </text>
  <text x="132" y="87" fill="#64748B" font-size="15" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="500" letter-spacing="2.5">
    SHOP SMART
  </text>
</svg>
